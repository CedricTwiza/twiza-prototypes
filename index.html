<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twiza — Espace prototypes</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f7f3ee;
      color: #2c2c2c;
      max-width: 680px;
      margin: 60px auto;
      padding: 0 24px;
    }
    h1 {
      font-size: 1.4em;
      color: #6b4f2a;
      border-bottom: 2px solid #e0d5c7;
      padding-bottom: 12px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 0.88em;
      color: #999;
      margin-bottom: 40px;
    }
    .proto-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .proto-list li {
      background: #fff;
      border: 1px solid #e0d5c7;
      border-radius: 6px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .proto-list li:hover {
      border-color: #8b6a3e;
    }
    .proto-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      text-decoration: none;
      color: #2c2c2c;
    }
    .proto-list .name {
      font-weight: bold;
      font-size: 1em;
    }
    .proto-list .date {
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 0.8em;
      color: #aaa;
    }
    .proto-list .arrow {
      color: #8b6a3e;
      font-size: 0.9em;
    }
    footer {
      margin-top: 60px;
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 0.78em;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>🌿 Twiza — Espace prototypes</h1>
  <p class="subtitle">Maquettes et tests en cours — usage interne</p>

  <ul class="proto-list">
    <li>
      <a href="twiza-formations.html">
        <span class="name">📋 Catalogue des formations</span>
        <span class="date">Mars 2026</span>
        <span class="arrow">→</span>
      </a>
    </li>
    <!-- Ajouter les futurs prototypes ici en copiant le bloc <li> ci-dessus -->
  </ul>

  <footer>cedrictwiza.github.io/twiza-prototypes</footer>

</body>
</html>
